<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup | AI JobHub</title>

<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="container">

<div class="form-box">

<h1>Create Account</h1>

<form id="signupForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="signupEmail"
placeholder="Email"
required>

<input
type="password"
id="signupPassword"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Create Account

</button>

</form>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

<script src="js/auth.js"></script>

</body>

</html>
