<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI JobHub</title>

    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>Welcome Back 👋</h1>
        <p>Login to continue</p>

        <form id="loginForm">

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>
        </p>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
